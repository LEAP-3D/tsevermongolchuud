<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3fb"/>
      <stop offset="100%" stop-color="#dde7f7"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 76px 'Arial', sans-serif; fill: #1f2937; }
      .nodeText { font: 500 42px 'Arial', sans-serif; fill: #f8fafc; }
      .smallText { font: 600 28px 'Arial', sans-serif; fill: #1f2937; }
      .line { stroke: #111827; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .soft { fill: #76a0cf; }
      .dark { fill: #1f4f8b; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="280" cy="120" rx="180" ry="90" fill="#2f73cf" opacity="0.35" filter="url(#blur)"/>
  <ellipse cx="1300" cy="150" rx="200" ry="90" fill="#2f73cf" opacity="0.35" filter="url(#blur)"/>
  <ellipse cx="1220" cy="760" rx="220" ry="110" fill="#2f73cf" opacity="0.28" filter="url(#blur)"/>

  <text x="800" y="95" text-anchor="middle" class="title">USER FLOW</text>

  <!-- Start -->
  <rect x="90" y="180" width="190" height="82" rx="41" class="soft"/>
  <text x="185" y="232" text-anchor="middle" class="nodeText">Эхлэл</text>

  <!-- Decision 1 -->
  <polygon points="185,350 335,450 185,550 35,450" class="dark"/>
  <text x="185" y="432" text-anchor="middle" class="nodeText">
    <tspan x="185" dy="0">Хэрэглэгч</tspan>
    <tspan x="185" dy="46">бүртгэлтэй юу?</tspan>
  </text>

  <!-- Register -->
  <rect x="40" y="640" width="290" height="88" rx="24" class="soft"/>
  <text x="185" y="695" text-anchor="middle" class="nodeText">Хэрэглэгч бүртгүүлэх</text>

  <!-- Login -->
  <rect x="430" y="392" width="250" height="118" rx="24" class="dark"/>
  <text x="555" y="455" text-anchor="middle" class="nodeText">
    <tspan x="555" dy="0">Login-оор</tspan>
    <tspan x="555" dy="46">нэвтрэх</tspan>
  </text>

  <!-- Decision 2 -->
  <polygon points="860,355 1010,450 860,545 710,450" class="dark"/>
  <text x="860" y="437" text-anchor="middle" class="nodeText">
    <tspan x="860" dy="0">Extension</tspan>
    <tspan x="860" dy="46">татсан уу?</tspan>
  </text>

  <!-- Download extension -->
  <rect x="700" y="640" width="320" height="88" rx="24" class="soft"/>
  <text x="860" y="695" text-anchor="middle" class="nodeText">Extension татах</text>

  <!-- Dashboard -->
  <rect x="1100" y="392" width="280" height="118" rx="24" class="soft"/>
  <text x="1240" y="455" text-anchor="middle" class="nodeText">
    <tspan x="1240" dy="0">Хянах самбар</tspan>
    <tspan x="1240" dy="46">нээх</tspan>
  </text>

  <!-- End -->
  <rect x="1410" y="415" width="170" height="72" rx="36" class="soft"/>
  <text x="1495" y="461" text-anchor="middle" class="nodeText">Төгсгөл</text>

  <!-- Arrows -->
  <path d="M185 262 L185 342" class="line"/>
  <path d="M335 450 L430 450" class="line"/>
  <path d="M185 550 L185 632" class="line"/>
  <path d="M330 684 L430 684 L430 510" class="line"/>
  <path d="M680 450 L702 450" class="line"/>
  <path d="M1010 450 L1092 450" class="line"/>
  <path d="M1240 510 L1240 600 L1495 600 L1495 495" class="line"/>
  <path d="M860 545 L860 632" class="line"/>
  <path d="M1020 684 L1080 684 L1080 560 L940 560" class="line"/>

  <!-- Branch labels -->
  <text x="382" y="438" class="smallText">Тийм</text>
  <text x="198" y="598" class="smallText">Үгүй</text>
  <text x="1040" y="438" class="smallText">Тийм</text>
  <text x="873" y="597" class="smallText">Үгүй</text>
</svg>
