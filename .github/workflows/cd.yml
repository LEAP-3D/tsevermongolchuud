name: CD
on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "prisma/**"
      - ".github/workflows/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }} # Added here
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./apps/frontend/package-lock.json
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client # Added this step to CD as well
        run: npm run db:generate
      - name: Pull Vercel Environment Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Production
        run: |
          for attempt in 1 2 3; do
            echo "Production deploy attempt $attempt/3"
            if vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Production deploy failed, retrying in 20s..."
              sleep 20
            fi
          done
          echo "Production deploy failed after 3 attempts."
          exit 1
