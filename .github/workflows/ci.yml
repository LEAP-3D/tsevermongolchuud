name: CI
on:
  push:
    branches: [test]
    paths:
      - "apps/frontend/**"
      - "prisma/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: ./apps/frontend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./apps/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint

  build:
    needs: lint
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }} # Added here
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./apps/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  preview:
    needs: build
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }} # Added here
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./apps/frontend/package-lock.json
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npm run db:generate
      - name: Pull and Deploy Preview
        id: deploy
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          DEPLOY_URL=""
          for attempt in 1 2 3; do
            echo "Preview deploy attempt $attempt/3"
            if DEPLOY_URL=$(vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }}); then
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Preview deploy failed, retrying in 20s..."
              sleep 20
            fi
          done
          if [ -z "$DEPLOY_URL" ]; then
            echo "Preview deploy failed after 3 attempts."
            exit 1
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
      - name: Post Preview Link to PR
        uses: mshick/add-pr-comment@v2
        with:
          message-id: vercel-preview
          message: |
            🚀 **Vercel Preview Deployed!**
            **URL:** ${{ steps.deploy.outputs.url }}
